<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그 확인 - 연구소 라벨 제작 프로그램</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Dark Mode Logic
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }
        initTheme();

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
    </script>
    <style>
        .logs-container {
            margin-top: 24px;
        }
        
        .log-controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .log-controls > div {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .log-controls label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 0;
        }
        
        .log-display {
            background: #0f172a;
            color: #f8fafc;
            padding: 24px;
            border-radius: var(--radius-lg);
            max-height: 600px;
            overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
        }
        
        .log-line {
            margin-bottom: 6px;
            padding: 6px 10px;
            border-radius: 4px;
            word-break: break-all;
        }
        
        .log-line.info {
            background: rgba(14, 165, 233, 0.1);
            border-left: 3px solid #0ea5e9;
        }
        
        .log-line.warning {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid #f59e0b;
        }
        
        .log-line.error {
            background: rgba(225, 29, 72, 0.1);
            border-left: 3px solid #e11d48;
        }
        
        .log-line.debug {
            background: rgba(139, 92, 246, 0.1);
            border-left: 3px solid #8b5cf6;
        }
        
        .log-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .log-actions button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--surface-color);
            color: var(--text-main);
        }
        
        .log-actions button svg {
            width: 18px;
            height: 18px;
        }

        .btn-home:hover { background: var(--secondary-bg); border-color: var(--primary-color); color: var(--primary-color); }
        .btn-refresh { background: var(--primary-color) !important; color: white !important; border-color: var(--primary-color) !important; }
        .btn-refresh:hover { background: var(--primary-hover) !important; transform: translateY(-1px); }
        .btn-download:hover { background: var(--success-bg); border-color: var(--success-text); color: var(--success-text); }
        .btn-clear:hover { background: var(--error-bg); border-color: var(--error-text); color: var(--error-text); }
        
        .log-info {
            background: var(--secondary-bg);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            border-left: 4px solid var(--primary-color);
        }
        
        .log-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: var(--surface-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        
        .empty-logs {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-style: italic;
        }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-direction: row !important;
        }
        
        .auto-refresh input[type="checkbox"] {
            margin: 0;
            width: auto;
            accent-color: var(--primary-color);
        }
        
        @media (max-width: 768px) {
            .log-controls { flex-direction: column; align-items: stretch; }
            .log-controls > div { width: 100%; }
            .log-actions { flex-direction: column; }
            .log-actions button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode">
            <i data-lucide="moon"></i>
        </button>
        <div class="header-container">
            <h1>시스템 로그 확인</h1>
        </div>
        
        <div class="log-actions">
            <button class="btn-home" onclick="location.href='/'">
                <i data-lucide="home"></i> 홈으로
            </button>
            <button class="btn-refresh" onclick="loadLogs()">
                <i data-lucide="refresh-cw"></i> 새로고침
            </button>
            <button class="btn-download" onclick="downloadLogs()">
                <i data-lucide="download"></i> 다운로드
            </button>
            <button class="btn-clear" onclick="clearLogs()">
                <i data-lucide="trash-2"></i> 초기화
            </button>
        </div>
        
        <div class="log-controls">
            <div>
                <label for="lines">표시할 줄 수:</label>
                <select id="lines" onchange="loadLogs()">
                    <option value="50">50줄</option>
                    <option value="100" selected>100줄</option>
                    <option value="200">200줄</option>
                    <option value="500">500줄</option>
                    <option value="1000">1000줄</option>
                </select>
            </div>
            
            <div>
                <label for="level">로그 레벨:</label>
                <select id="level" onchange="loadLogs()">
                    <option value="all" selected>전체</option>
                    <option value="INFO">INFO</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                    <option value="DEBUG">DEBUG</option>
                </select>
            </div>
            
            <div>
                <label for="search">검색:</label>
                <input type="text" id="search" placeholder="검색어 입력..." onkeyup="debounceSearch()">
            </div>
            
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
                <label for="autoRefresh" style="cursor: pointer;">자동 새로고침 (5초)</label>
            </div>
        </div>
        
        <div class="log-info" id="logInfo" style="display: none;">
            <div class="log-stats" id="logStats"></div>
            <div id="logMessage" style="font-size: 0.9rem; color: var(--text-main);"></div>
        </div>
        
        <div class="logs-container">
            <div class="log-display" id="logDisplay">
                <div class="loading">
                    <i data-lucide="loader-2" style="animation: spin 1s linear infinite; margin: 0 auto; display: block; color: var(--text-muted);"></i>
                    <p style="margin-top: 10px; color: var(--text-muted);">로그를 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let searchTimeout = null;
        
        function loadLogs() {
            const lines = document.getElementById('lines').value;
            const level = document.getElementById('level').value;
            const search = document.getElementById('search').value;
            
            const params = new URLSearchParams({
                lines: lines,
                level: level,
                search: search
            });
            
            document.getElementById('logDisplay').innerHTML = `
                <div class="loading">
                    <i data-lucide="loader-2" style="animation: spin 1s linear infinite; margin: 0 auto; display: block; color: var(--text-muted);"></i>
                    <p style="margin-top: 10px; color: var(--text-muted);">로그를 불러오는 중...</p>
                </div>
            `;
            lucide.createIcons();
            
            fetch(`/api/logs?${params}`)
                .then(response => response.json())
                .then(data => {
                    displayLogs(data);
                })
                .catch(error => {
                    console.error('Error loading logs:', error);
                    document.getElementById('logDisplay').innerHTML = 
                        '<div class="empty-logs">로그를 불러오는 중 오류가 발생했습니다.</div>';
                });
        }
        
        function displayLogs(data) {
            const logDisplay = document.getElementById('logDisplay');
            const logInfo = document.getElementById('logInfo');
            const logStats = document.getElementById('logStats');
            const logMessage = document.getElementById('logMessage');
            
            if (data.success) {
                logStats.innerHTML = `
                    <div class="stat-item">총 로그: ${data.total_lines}줄</div>
                    <div class="stat-item">요청: ${data.requested_lines}줄</div>
                    <div class="stat-item">필터: ${data.level_filter}</div>
                    ${data.search_filter ? `<div class="stat-item">검색: "${data.search_filter}"</div>` : ''}
                `;
                
                logMessage.textContent = data.message || '';
                logInfo.style.display = 'block';
                
                if (data.logs.length === 0) {
                    logDisplay.innerHTML = '<div class="empty-logs">표시할 로그가 없습니다.</div>';
                    return;
                }
                
                let logsHtml = '';
                data.logs.forEach(log => {
                    const logClass = getLogClass(log);
                    logsHtml += `<div class="log-line ${logClass}">${escapeHtml(log)}</div>`;
                });
                
                logDisplay.innerHTML = logsHtml;
                logDisplay.scrollTop = logDisplay.scrollHeight;
                
            } else {
                logDisplay.innerHTML = `<div class="empty-logs">오류: ${data.error}</div>`;
                logInfo.style.display = 'none';
            }
        }
        
        function getLogClass(logLine) {
            if (logLine.includes('ERROR')) return 'error';
            if (logLine.includes('WARNING')) return 'warning';
            if (logLine.includes('DEBUG')) return 'debug';
            if (logLine.includes('INFO')) return 'info';
            return '';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function downloadLogs() {
            window.open('/api/logs/download', '_blank');
        }
        
        function clearLogs() {
            if (!confirm('정말로 로그를 초기화하시겠습니까? 기존 로그는 백업됩니다.')) {
                return;
            }
            
            fetch('/api/logs/clear', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    loadLogs();
                } else {
                    alert('오류: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error clearing logs:', error);
                alert('로그 초기화 중 오류가 발생했습니다.');
            });
        }
        
        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            
            if (checkbox.checked) {
                autoRefreshInterval = setInterval(loadLogs, 5000);
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }
        
        function debounceSearch() {
            if (searchTimeout) {
                clearTimeout(searchTimeout);
            }
            searchTimeout = setTimeout(loadLogs, 500);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            loadLogs();
        });
        
        window.addEventListener('beforeunload', function() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    </script>
</body>
</html>
