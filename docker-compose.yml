version: '3.8'

services:
  qr-web:
    build: .
    container_name: qr-web-app
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your_secret_key_change_in_production}
      - FLASK_ENV=${FLASK_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FLASK_PORT=5000
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./static/img:/app/static/img
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
